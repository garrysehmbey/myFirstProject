<!DOCTYPE html>
<html>
<head>
<meta name="description" content="Garry Sehmbey - Full Stack Developer Portfolio Website. Java, React, Spring Boot, Web Development and Modern Apps.">

<meta name="keywords" content="Garry Sehmbey, Full Stack Developer, Java Developer, React Developer, Spring Boot, Portfolio Website">

<meta name="author" content="Garry Sehmbey">
  <title>Garry Sehmbey</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="auth-screen">
    <h2>Authorized Access</h2>

    <input type="text" id="nameInput" placeholder="Enter your name">

    <button onclick="checkAccess()">Enter Website</button>
  </div>

  <div id="main-content" style="display: none;">

    <!-- Tuhadi puri website ithon start hougi -->
    <div class="hero">
      <img src="myphoto.jpg" class="profile-pic">

      <h1>Garry Sehmbey</h1>
      <p>Full Stack Developer</p>

      <button onclick="playMusic(); alert('Mission in Progress 🚀 More exciting updates coming soon!')">
        Contact Me
      </button>
    </div>

  </div>

  <audio id="bgMusic">
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    function checkAccess() {
      const allowedNames = ["gurpreet", "garry", "navneet", "rubaani","ajay","pankaj","garrysehmbey","ajaymughraan","baljitkaur","baljit"];
      const enteredName = document.getElementById("nameInput").value.toLowerCase().trim();

      if (allowedNames.includes(enteredName)) {
        document.getElementById("bgMusic").play();
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("main-content").style.display = "block";
      } else {
        alert("Access Denied");
      }
    }

    function playMusic() {
      const music = document.getElementById("bgMusic");
      music.play();
    }
  </script>

</body>
</html>
